version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "PayCentral@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=PayCentralExpenseCard;User Id=sa;Password=PayCentral@123;TrustServerCertificate=True
      - JwtSettings__SecretKey=PayCentral-Super-Secret-Key-2024-MinimumLength-32Characters-Required
      - JwtSettings__Issuer=PayCentral.API
      - JwtSettings__Audience=PayCentral.Client
      - JwtSettings__ExpiryMinutes=15
    depends_on:
      - sqlserver

volumes:
  sqlserver_data: